<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wyszukiwarka - 100 twarzy grzybiarzy</title>
    <link rel="stylesheet" href="dstyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="trzeci-panel" id="trzeci-panel">
        <div class="sidebar">
            <input type="text" id="youtube-query" placeholder="Wyszukaj..">
            <button id="search-btn">Szukaj</button>
        </div>
        <div id="video-results"></div>
        <div id="pagination-container" style="margin-top: 20px; display: none;">
            <button id="load-more-btn">Załaduj więcej</button>
        </div>
    </div>

    <div id="video-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <iframe id="youtube-player" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>

    <script src="dscript.js"></script>
</body>
</html>
